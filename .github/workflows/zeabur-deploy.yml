name: Deploy to Zeabur

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Zeabur
        run: |
          curl -L https://pkg.zeabur.com/zeabur.sh | bash
          zeabur deploy --token ${{ secrets.ZEABUR_TOKEN }}

      - name: Setup Go
        if: false
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        if: false
        run: |
          cd backend
          go mod download
          go build -o aurora-server ./cmd/server

      - name: Upload artifact
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/aurora-server